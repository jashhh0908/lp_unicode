<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <h1>Document Collaboration Module</h1>

      <button onclick="joinDocument()">Join Document</button>
      <button onclick="leaveCurrentDoc()">Leave Document</button>

      <br><br>
      <textarea id="editor" rows="15" cols="80" placeholder="Start typing..."></textarea>
      <div id="users"></div>
      <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
      <script>
            let socket;
            let heartbeatInterval;
            let insideDoc = false;
            const documentId = "69bbe57121038c50714d4968"; // static for now
            const userId = "69bbe53521038c50714d4965"; // static for now to test new versioning logic 
            const usersDiv = document.getElementById("users"); 
            const editor = document.getElementById("editor");
            editor.disabled = true;

            function createConnection() {
                socket = io("http://localhost:5000");

                socket.on("presence:update", ({users}) => {
                    if(insideDoc)
                        usersDiv.innerText = "Active Users: " + users.map(u => u.userId);
                });

                socket.on("doc:update", ({ content }) => {
                    if(insideDoc)
                        editor.value = content;
                });

                socket.on("error", ({ message }) => {
                    console.error("Error:", message);
                });
            }

            function joinDocument() {
                if(insideDoc) return;
                if(!socket) return;
                socket.emit("joinDoc", { documentId, userId });
            }

            function startHeartbeat(documentId) {
                heartbeatInterval = setInterval(() => {
                  socket.emit("heartbeat", { documentId });
                }, 10000);
            }

            function leaveCurrentDoc() {
                leaveDoc(documentId);
            }

            function leaveDoc(documentId) {
                socket.emit("leaveDoc", { documentId });
                if (heartbeatInterval) {
                    clearInterval(heartbeatInterval);
                    heartbeatInterval = null;
                }
                editor.disabled = true;
                editor.value = "";
                usersDiv.innerText = "";
                insideDoc = false;
                console.log("Left Document:", documentId);
            }

            editor.addEventListener("input", () => {
                if (!socket) return;
                if(insideDoc)
                    socket.emit("doc:change", {
                        documentId,
                        content: editor.value,
                        lastUpdated: Date.now()
                    });
            });

            window.onload = () => {
                createConnection();
                socket.on("doc:load", (doc) => {
                    insideDoc = true;
                    editor.disabled = false;
                    editor.value = doc.content;
                    console.log("Joined document:", documentId);
                    console.log("Loaded Doc: ", doc.title, doc.createdBy);
                    startHeartbeat(documentId);
            });
            }
      </script>
</body>
</html>
